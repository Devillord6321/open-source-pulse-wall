name: 我有改进想法
description: 想加新功能、改设计、优化课堂体验——都欢迎。
title: "[Idea] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎想法！想清楚「为谁解决什么问题」会让你的提案更有说服力。

  - type: textarea
    id: story
    attributes:
      label: 用户故事
      description: 用「作为 X，我希望 Y，这样就能 Z」的格式。
      placeholder: "作为第一次提 PR 的同学，我希望首页有个进度条提示当前我在第几步，这样就能知道接下来该做什么。"
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: 为什么这件事重要
      placeholder: "新同学经常问『现在到哪一步了』，加进度条可以减少老师重复回答。"
    validations:
      required: true

  - type: textarea
    id: how
    attributes:
      label: 你想到的实现方式（可选）
      placeholder: "在 #guide 区域顶上加一行 1/4 → 2/4 → ... 的小步骤指示器。"

  - type: textarea
    id: alternatives
    attributes:
      label: 有没有别的方案 / 类似项目作为参考（可选）
